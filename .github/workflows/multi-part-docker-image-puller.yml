name: Pull image and publish release asset

on:
  workflow_dispatch:
    inputs:
      image_ref:
        description: "Container image reference, e.g. ghcr.io/org/app or ghcr.io/org/app:tag"
        required: true
        type: string
      release_tag:
        description: "GitHub release tag, e.g. v1.2.3"
        required: true
        type: string
      runtime:
        description: "Tool to use for pulling/saving the image"
        required: true
        type: choice
        default: docker
        options:
          - docker
          - podman

jobs:
  pull-and-upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      IMAGE_REF_INPUT: ${{ github.event.inputs.image_ref }}
      RELEASE_TAG: ${{ github.event.inputs.release_tag }}
      RUNTIME: ${{ github.event.inputs.runtime }}

    steps:
      - name: Install Podman (if needed)
        if: ${{ env.RUNTIME == 'podman' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y podman gzip

      - name: Normalize image reference
        shell: bash
        run: |
          set -euo pipefail

          IMAGE_REF="$IMAGE_REF_INPUT"

          # If no explicit tag is present, use :latest.
          if [[ "$IMAGE_REF" != *@* ]] && [[ ! "$IMAGE_REF" =~ :[^/]+$ ]]; then
            IMAGE_REF="${IMAGE_REF}:latest"
          fi

          echo "IMAGE_REF=$IMAGE_REF" >> "$GITHUB_ENV"

      - name: Login to GHCR
        if: ${{ startsWith(env.IMAGE_REF_INPUT, 'ghcr.io/') }}
        shell: bash
        run: |
          if [ "$RUNTIME" = "podman" ]; then
            echo "${{ github.token }}" | podman login ghcr.io \
              -u "${{ github.actor }}" --password-stdin
          else
            echo "${{ github.token }}" | docker login ghcr.io \
              -u "${{ github.actor }}" --password-stdin
          fi

      - name: Pull image and save it
        shell: bash
        run: |
          set -euo pipefail

          echo "Using image: $IMAGE_REF"

          if [ "$RUNTIME" = "podman" ]; then
            podman pull "$IMAGE_REF"
            podman save -o image.tar "$IMAGE_REF"
          else
            docker pull "$IMAGE_REF"
            docker save -o image.tar "$IMAGE_REF"
          fi

      - name: Split archive into chunks
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p chunks

          # 1900 MiB keeps a safe margin under GitHub's <2 GiB per-asset limit.
          split -b 1900M -d -a 3 image.tar chunks/image.tar.part-

          rm -f image.tar

          ls -lh chunks

      - name: Upload chunked assets to release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          if gh release view "$RELEASE_TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" chunks/* \
              --repo "${{ github.repository }}" \
              --clobber
          else
            gh release create "$RELEASE_TAG" chunks/* \
              --repo "${{ github.repository }}" \
              --title "$RELEASE_TAG" \
              --notes "Chunked container image archive for $IMAGE_REF"
          fi
